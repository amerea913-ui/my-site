<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>XMrAmer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<div class="logo">⚽ XMrAmer</div>
</nav>

<div class="players" id="players"></div>

<!-- فقط ادمین می‌بیند -->
<button id="adminBtn" class="fab" onclick="openLogin()" style="display:none;">⚙</button>

<div class="panel" id="panel">
<h4>🔐 ورود مدیر</h4>
<input id="pass" type="password" placeholder="رمز">
<button onclick="login()">ورود</button>
</div>

<!-- CHAT REAL UI -->
<button class="chatBtn" onclick="toggleChat()">💬</button>

<div class="chat" id="chat">
<div id="msgs"></div>
<input id="msg" placeholder="پیام">
<button onclick="send()">ارسال</button>
</div>

<!-- AI REAL UI -->
<div class="ai" id="ai">
<h4>🤖 AI Chat</h4>
<textarea id="q"></textarea>
<button onclick="ask()">ارسال</button>
<p id="ans"></p>
</div>

<script src="script.js"></script>
</body>
</html>
